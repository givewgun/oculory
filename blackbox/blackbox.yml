# Blackbox exporter probe modules.
modules:
  http_2xx:
    prober: http
    timeout: 8s
    http:
      valid_http_versions: [HTTP/1.1, HTTP/2.0]
      valid_status_codes: [200, 204, 301, 302, 401, 403]  # endpoint up even if auth-gated
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: false

  http_health:
    prober: http
    timeout: 8s
    http:
      valid_status_codes: [200]
      method: GET
      fail_if_body_not_matches_regexp:
        - "(?i)(ok|healthy|true|up)"
