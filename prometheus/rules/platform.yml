# Oculory alert rules. Severity drives routing (warning -> Telegram; critical -> both).
groups:
  # ---------------------------------------------------------- availability
  - name: availability
    rules:
      - alert: ContainerDown
        # docker-stats exporter reports up=0 for a non-running known container.
        expr: |
          docker_container_up{name=~"gunvest-.*|legion-.*|horizon-.*|global-tunnel"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "{{ $labels.name }} is not running on the givewgun VM."

      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Scrape target {{ $labels.job }} ({{ $labels.instance }}) down"
          description: "Prometheus cannot scrape {{ $labels.instance }}."

      - alert: BlackboxProbeDown
        expr: probe_success == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Public endpoint {{ $labels.instance }} failing"
          description: "Blackbox probe to {{ $labels.instance }} has failed for >2m."

      - alert: CertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires soon"
          description: "Certificate expires in {{ $value | humanize }} days."

  # ---------------------------------------------------------- host USE
  - name: host
    rules:
      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Host CPU >90% for 10m"
          description: "CPU at {{ $value | humanize }}% on {{ $labels.instance }}."

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Host memory >90%"
          description: "Memory at {{ $value | humanize }}% — Ollama (12g cap) is the usual suspect."

      - alert: HostLowDisk
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "Root disk <15% free"
          description: "Only {{ $value | humanize }}% free on / — check Loki/Tempo/Prometheus retention."

      - alert: HostDiskWillFill24h
        expr: predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[6h], 24*3600) < 0
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: "Root disk projected to fill within 24h"
          description: "Trend over 6h projects / runs out in <24h."

  # ---------------------------------------------------------- RED (apps)
  - name: red
    rules:
      - alert: HighErrorRate
        expr: |
          sum by (service) (rate(http_request_duration_seconds_count{status_code=~"5.."}[5m]))
          /
          sum by (service) (rate(http_request_duration_seconds_count[5m])) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "{{ $labels.service }} 5xx rate >5%"
          description: "{{ $labels.service }} is serving {{ $value | humanizePercentage }} 5xx responses."

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))) > 2
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "{{ $labels.service }} p99 latency >2s"
          description: "p99 request latency for {{ $labels.service }} is {{ $value | humanizeDuration }}."

      - alert: NodeEventLoopLag
        expr: nodejs_eventloop_lag_p99_seconds > 0.2
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "{{ $labels.service }} event-loop lag high"
          description: "Node event-loop p99 lag {{ $value | humanizeDuration }} on {{ $labels.instance }}."

  # ---------------------------------------------------------- dependencies
  - name: dependencies
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "gunvest-db unreachable"
          description: "postgres-exporter cannot reach gunvest-db."

      - alert: PostgresTooManyConnections
        expr: sum(pg_stat_activity_count) / max(pg_settings_max_connections) > 0.8
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Postgres connections >80% of max"
          description: "{{ $value | humanizePercentage }} of max_connections in use."

      - alert: NatsConsumerLag
        expr: nats_consumer_num_pending > 200
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "NATS consumer backlog on {{ $labels.consumer_name }}"
          description: "{{ $value }} pending messages — a legion worker may be stuck."

      - alert: OllamaRestartLoop
        expr: increase(docker_container_restarts{name="legion-ollama"}[15m]) > 0
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "legion-ollama restarted"
          description: "Ollama container restarted in the last 15m (OOM at 12g cap?)."

      - alert: ContainerOOMKilled
        expr: docker_container_oom_killed{name=~"gunvest-.*|legion-.*|horizon-.*"} == 1
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: "OOM kill on {{ $labels.name }}"
          description: "{{ $labels.name }} was OOM-killed — review mem_limit."

  # ---------------------------------------------------------- logs (Loki via Prometheus? no -> see loki ruler)
  - name: pipeline
    rules:
      - alert: LegionCycleFailures
        expr: increase(legion_cycles_total{status="failed"}[1h]) > 2
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Legion cycles failing"
          description: "{{ $value }} failed legion cycles in the last hour."

      - alert: GunvestJobStale
        expr: time() - gunvest_job_last_success_timestamp_seconds > 1800
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "gunvest job {{ $labels.job_name }} stale"
          description: "No successful run of {{ $labels.job_name }} in >30m (market poll = 5m cadence)."
