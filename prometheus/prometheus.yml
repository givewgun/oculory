# Oculory Prometheus scrape config.
# Targets are reached by docker DNS name over the shared networks Prometheus joins.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: oculory
    vm: givewgun

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['oculory-alertmanager:9093']

scrape_configs:
  # ---- platform self-monitoring ----
  - job_name: prometheus
    static_configs: [{ targets: ['localhost:9090'] }]

  - job_name: grafana
    static_configs: [{ targets: ['oculory-grafana:3000'] }]

  - job_name: loki
    static_configs: [{ targets: ['oculory-loki:3100'] }]

  - job_name: tempo
    static_configs: [{ targets: ['oculory-tempo:3200'] }]

  - job_name: alloy
    static_configs: [{ targets: ['oculory-alloy:12345'] }]

  - job_name: alertmanager
    static_configs: [{ targets: ['oculory-alertmanager:9093'] }]

  # ---- NOC / platform exporters ----
  - job_name: node
    static_configs: [{ targets: ['oculory-node-exporter:9100'], labels: { instance: givewgun-vm } }]

  - job_name: docker-stats
    static_configs: [{ targets: ['oculory-docker-stats:9101'] }]

  - job_name: postgres
    static_configs: [{ targets: ['oculory-postgres-exporter:9187'], labels: { service: gunvest-db } }]

  - job_name: nats
    static_configs: [{ targets: ['oculory-nats-exporter:7777'], labels: { service: legion-nats } }]

  - job_name: cloudflared
    static_configs: [{ targets: ['global-tunnel:2000'], labels: { service: tunnel } }]

  # ---- synthetic probes (blackbox) ----
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://gunvest.givewgun.com/api/health/status
          - https://legion.givewgun.com/
          - https://horizon.givewgun.com/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: oculory-blackbox-exporter:9115

  # ---- application /metrics (RED + domain + business) ----
  - job_name: gunvest-app
    metrics_path: /metrics
    static_configs: [{ targets: ['gunvest-app:3001'], labels: { service: gunvest } }]

  - job_name: horizon-app
    metrics_path: /metrics
    static_configs: [{ targets: ['horizon-app:8080'], labels: { service: horizon } }]

  # legion: every worker process exposes its own registry on :9100
  - job_name: legion
    metrics_path: /metrics
    static_configs:
      - targets: ['legion-api:9100',        'legion-emitter:9100',  'legion-scheduler:9100',
                  'legion-risk:9100',        'legion-agent-technical:9100',
                  'legion-agent-news:9100',  'legion-agent-social:9100',
                  'legion-agent-contrarian:9100']
        labels: { service: legion }
    relabel_configs:
      - source_labels: [__address__]
        regex: 'legion-([a-z-]+):9100'
        target_label: legion_role
        replacement: '$1'
